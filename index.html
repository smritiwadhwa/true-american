<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>True American — Card Deck</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #0d1b2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
    }

    .game-title {
      font-family: 'Playfair Display', serif;
      color: #d4af37;
      font-size: 26px;
      letter-spacing: 5px;
      margin-bottom: 4px;
      text-align: center;
    }
    .game-subtitle {
      color: #4a6580;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 24px;
      text-align: center;
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .progress-track {
      width: 180px;
      height: 3px;
      background: #1e3048;
      border-radius: 2px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #d4af37, #f5d060);
      border-radius: 2px;
      transition: width 0.5s ease;
      width: 0%;
    }
    .progress-label {
      font-size: 12px;
      font-weight: 600;
      color: #4a6580;
      letter-spacing: 1px;
      min-width: 52px;
      text-align: right;
    }

    .deck-area {
      position: relative;
      width: 320px;
      margin-bottom: 20px;
    }
    .stack-shadow {
      position: absolute;
      width: 320px;
      height: 14px;
      border-radius: 16px;
      background: #fff;
      transition: opacity 0.4s;
    }
    .stack-shadow-1 { bottom: -5px; left: 5px; opacity: 0.12; z-index: 0; }
    .stack-shadow-2 { bottom: -10px; left: 10px; opacity: 0.07; z-index: -1; }

    .card-wrapper {
      position: relative;
      z-index: 1;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .card-wrapper:hover { filter: brightness(1.05); }

    /* ── Card Back (face-down) ── */
    .card-back-face {
      background: linear-gradient(145deg, #9b1c1c, #7a1414);
      border: 3px solid #d4af37;
      border-radius: 16px;
      padding: 36px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      min-height: 230px;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
    }
    .back-stars {
      display: flex;
      gap: 9px;
      color: #d4af37;
      font-size: 14px;
      opacity: 0.55;
    }
    .back-title {
      font-family: 'Playfair Display', serif;
      color: #d4af37;
      font-size: 24px;
      letter-spacing: 4px;
      text-align: center;
    }
    .back-rule {
      width: 70px;
      height: 1px;
      background: rgba(212,175,55,0.45);
    }
    .back-tap-icon {
      font-size: 24px;
      animation: tap-pulse 1.9s ease-in-out infinite;
    }
    .back-tap-label {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(212,175,55,0.5);
    }
    @keyframes tap-pulse {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.18); }
    }

    /* ── Card content ── */
    .card {
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }
    .card-header {
      padding: 18px 20px 14px;
      color: #fff;
      text-align: center;
    }
    .card-header .label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 5px;
    }
    .card-header .title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      letter-spacing: 0.5px;
      line-height: 1.2;
    }
    .card-header .reward-pill {
      display: inline-block;
      margin-top: 8px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 3px 11px;
    }
    .count .card-header { background: linear-gradient(140deg, #1b3d6e, #2f80ed); }
    .count { border: 2px solid #2f80ed; }
    .quote .card-header { background: linear-gradient(140deg, #1a472a, #2d9950); }
    .quote { border: 2px solid #2d9950; }
    .common .card-header { background: linear-gradient(140deg, #3b1764, #7b3fbf); }
    .common { border: 2px solid #7b3fbf; }

    .card-body {
      padding: 14px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .instruction {
      font-size: 10.5px;
      color: #777;
      font-style: italic;
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 1px dashed #ddd;
    }
    .rule-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .rule-list li {
      font-size: 12.5px;
      color: #222;
      line-height: 1.5;
      padding: 7px 10px;
      background: #f5f8ff;
      border-radius: 7px;
    }
    .rule-list li strong { color: #2f80ed; }

    .quote-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .quote-item {
      padding: 8px 10px;
      background: #f6fbf8;
      border-radius: 8px;
      border-left: 3px solid #2d9950;
    }
    .item-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 3px;
    }
    .quote-start {
      font-size: 12.5px;
      font-style: italic;
      color: #111;
      line-height: 1.4;
    }
    .quote-completion {
      font-size: 11px;
      color: #555;
      margin-top: 3px;
      line-height: 1.3;
    }
    .quote-source {
      font-size: 10px;
      color: #aaa;
      text-align: right;
      margin-top: 2px;
    }

    .pair-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 14px 8px;
      gap: 2px;
    }
    .pair-item {
      font-family: 'Playfair Display', serif;
      font-size: 21px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.25;
    }
    .pair-ampersand {
      font-size: 16px;
      color: #9b6ed4;
      font-weight: 700;
      margin: 6px 0;
      letter-spacing: 1px;
    }
    .pair-answer-divider {
      width: 100%;
      height: 1px;
      background: #e0d5f0;
      margin: 4px 0 10px;
    }
    .pair-answer-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 5px;
    }
    .pair-answer-text {
      font-size: 12px;
      color: #555;
      font-style: italic;
      line-height: 1.55;
      text-align: center;
    }

    .card-footer {
      padding: 9px 16px;
      background: #fafafa;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10.5px;
    }
    .footer-wrong { color: #c0392b; font-weight: 500; }
    .footer-right { color: #27ae60; font-weight: 600; }

    /* ── Next button ── */
    .next-btn {
      display: block;
      width: 320px;
      padding: 15px;
      background: linear-gradient(135deg, #d4af37, #f5d060);
      color: #1a1200;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(212,175,55,0.3);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s, box-shadow 0.15s;
    }
    .next-btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .next-btn:hover {
      box-shadow: 0 8px 28px rgba(212,175,55,0.45);
      transform: translateY(-2px);
    }
    .next-btn:active { transform: translateY(0); }

    /* ── Done screen ── */
    #done-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }
    .done-title {
      font-family: 'Playfair Display', serif;
      color: #d4af37;
      font-size: 30px;
      letter-spacing: 2px;
    }
    .done-sub { color: #4a6580; font-size: 13px; }
    .restart-btn {
      margin-top: 6px;
      padding: 14px 40px;
      background: transparent;
      color: #d4af37;
      border: 2px solid #d4af37;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s, color 0.2s;
    }
    .restart-btn:hover { background: #d4af37; color: #1a1200; }
  </style>
</head>
<body>

  <h1 class="game-title">TRUE AMERICAN</h1>
  <p class="game-subtitle">Official Card Deck</p>

  <div class="progress-row">

      <div class="card-wrapper" id="card-wrapper" onclick="handleClick()">
        <div id="card-display"></div>
      </div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextCard()">Next Card →</button>
  </div>

  <div id="done-screen">
    <div class="done-title">Deck Complete!</div>
    <div class="done-sub">All 70 cards have been played.</div>
    <button class="restart-btn" onclick="restartDeck()">Shuffle &amp; Restart</button>

    const COMMON_CARDS = [
      { type: 'common', easy: false, item1: 'Carrots', item2: 'Flamingos', answer: 'Both get their color entirely from their diet — carrots from beta-carotene, flamingos from carotenoid pigments in the shrimp and algae they eat.' },

      { type: 'common', easy: false, item1: 'The First iPhone', item2: 'The Amazon Kindle', answer: 'Both launched in 2007. The iPhone went on sale June 29th; the Kindle launched November 19th — two devices that permanently changed media consumption, in the same year.' },

      { type: 'common', easy: true,  item1: 'The Olympics', item2: 'The FIFA World Cup', answer: 'Both are the world\'s biggest international sporting events, each held every 4 years.' },
      { type: 'common', easy: true,  item1: 'Romeo &amp; Juliet', item2: 'Titanic', answer: 'Both are iconic love stories that end in tragedy — the lovers don\'t make it.' },

      { type: 'common', easy: true,  item1: 'A Guitar', item2: 'A Piano', answer: 'Both are musical instruments and among the most commonly learned instruments in the world.' },
      { type: 'common', easy: true,  item1: 'The Sahara Desert', item2: 'The Amazon Rainforest', answer: 'Both are the world\'s largest of their kind — the Sahara is the largest hot desert, the Amazon is the largest tropical rainforest.' },
      { type: 'common', easy: true,  item1: 'Leonardo DiCaprio', item2: 'Brad Pitt', answer: 'Both are Oscar-winning Hollywood A-listers who have been among the biggest movie stars in the world for over 30 years.' },
      { type: 'common', easy: true,  item1: 'The Great Wall of China', item2: 'The Pyramids of Giza', answer: 'Both are ancient wonders of the world — massive structures built thousands of years ago that still stand today.' },
      { type: 'common', easy: true,  item1: 'Abraham Lincoln', item2: 'George Washington', answer: 'Both are on U.S. currency and carved into Mount Rushmore.' },
      { type: 'common', easy: true,  item1: 'Nike', item2: 'Adidas', answer: 'Both are the world\'s biggest sportswear and sneaker brands, and longtime rivals.' },

    ];

    // ─── Render ───

    function renderCountCard() {
      return `<div class="card count">
        <div class="card-header">
          <div class="label">Turn Challenge</div>
          <div class="title">THE COUNT</div>
          <div class="reward-pill">Winner moves +1 space</div>
        </div>
        <div class="card-body">
          <div class="instruction">Current player initiates — all players participate at the same time.</div>
          <ul class="rule-list">
            <li>1. Everyone yells <strong>"One! Two! Three!"</strong> together.</li>
            <li>2. Each player holds <strong>1–5 fingers</strong> against their forehead simultaneously.</li>
            <li>3. Any player whose number is <strong>unique</strong> (no one else chose it) wins and moves <strong>+1 space</strong>.</li>
            <li>4. If your number <strong>matches the current player's number</strong>, take that many swigs.</li>
            <li>5. The current player always moves 1 space regardless of outcome.</li>
          </ul>
        </div>
        <div class="card-footer">
          <span class="footer-wrong">Match = swig that many times</span>
          <span class="footer-right">Unique = +1</span>
        </div>
      </div>`;
    }

    function renderQuoteCard(card) {
      const opts = card.options.map((o, i) => `
        <li class="quote-item">
          <div class="item-label">Option ${i + 1}</div>
          <div class="quote-start">${o.start}</div>
          <div class="quote-completion">→ ${o.comp}</div>
          <div class="quote-source">${o.src}</div>
        </li>`).join('');
      return `<div class="card quote">
        <div class="card-header">
          <div class="label">Complete a Quote · ${card.theme}</div>
          <div class="title">COMPLETE A QUOTE</div>
          <div class="reward-pill">Winner moves +2 spaces</div>
        </div>
        <div class="card-body">
          <div class="instruction">Pick one. Slowly recite the start — first player to jump in and finish it wins. Wrong = 2 swigs.</div>
          <ul class="quote-list">${opts}</ul>
        </div>
        <div class="card-footer">
          <span class="footer-wrong">Wrong = 2 swigs</span>
          <span class="footer-right">Correct = +2</span>
        </div>
      </div>`;
    }

    function renderCommonCard(card) {
      const easyLabel = card.easy ? ' · Easy' : '';
      return `<div class="card common">
        <div class="card-header">
          <div class="label">Something in Common${easyLabel}</div>
          <div class="title">SOMETHING IN COMMON</div>
          <div class="reward-pill">Winner moves +3 spaces</div>
        </div>
        <div class="card-body">
          <div class="instruction">Read the pair aloud. First player to name what links them wins. Wrong = 3 swigs.</div>
          <div class="pair-display">
            <div class="pair-item">${card.item1}</div>
            <div class="pair-ampersand">&amp;</div>
            <div class="pair-item">${card.item2}</div>
          </div>
          <div class="pair-answer-divider"></div>
          <div class="pair-answer-label">Answer</div>
          <div class="pair-answer-text">${card.answer}</div>
        </div>
        <div class="card-footer">
          <span class="footer-wrong">Wrong = 3 swigs</span>
          <span class="footer-right">Correct = +3</span>
        </div>
      </div>`;
    }

    function renderCard(card) {
      if (card.type === 'count')  return renderCountCard();
      if (card.type === 'quote')  return renderQuoteCard(card);
      if (card.type === 'common') return renderCommonCard(card);
    }

    // ─── Deck ───

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildDeck() {
      const deck = [];
      for (let i = 0; i < 15; i++) deck.push(COUNT_CARD);
      QUOTE_CARDS.forEach(c => deck.push(c));
      COMMON_CARDS.forEach(c => deck.push(c));
      return shuffle(deck);
    }

    let deck = [];
    let currentIndex = 0;
    let isFlipped = false;
    let isAnimating = false;

    const CARD_BACK_HTML = `
      <div class="card-back-face">
        <div class="back-stars">★ ★ ★ ★ ★</div>
        <div class="back-title">TRUE AMERICAN</div>
        <div class="back-rule"></div>
        <div class="back-tap-icon">👆</div>
        <div class="back-tap-label">Tap to reveal</div>
        <div class="back-stars">★ ★ ★ ★ ★</div>
      </div>`;

    function updateProgress() {
      const pct = deck.length ? (currentIndex / deck.length) * 100 : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = currentIndex + ' / ' + deck.length;
    }

    function updateShadows() {
      const rem = deck.length - currentIndex;
      document.getElementById('shadow1').style.opacity = rem > 1 ? '0.12' : '0';
      document.getElementById('shadow2').style.opacity = rem > 3 ? '0.07' : '0';
    }

    function showBack() {
      document.getElementById('card-display').innerHTML = CARD_BACK_HTML;
      isFlipped = false;
    }

    function handleClick() {
      if (isAnimating || isFlipped) return;
      flipCard();
    }

    function flipCard() {
      isAnimating = true;
      const w = document.getElementById('card-wrapper');

      w.style.transition = 'transform 0.24s ease-in';
      w.style.transform = 'perspective(900px) rotateY(90deg)';

      setTimeout(() => {
        document.getElementById('card-display').innerHTML = renderCard(deck[currentIndex]);
        isFlipped = true;

        w.style.transition = 'none';
        w.style.transform = 'perspective(900px) rotateY(-90deg)';

        requestAnimationFrame(() => requestAnimationFrame(() => {
          w.style.transition = 'transform 0.24s ease-out';
          w.style.transform = 'perspective(900px) rotateY(0deg)';

          setTimeout(() => {
            isAnimating = false;
            document.getElementById('next-btn').classList.add('visible');
          }, 240);
        }));
      }, 240);
    }

    function nextCard() {
      if (isAnimating) return;
      isAnimating = true;

      document.getElementById('next-btn').classList.remove('visible');
      const w = document.getElementById('card-wrapper');

      w.style.transition = 'transform 0.2s ease-in, opacity 0.2s ease-in';
      w.style.transform = 'perspective(900px) rotateY(-90deg)';
      w.style.opacity = '0';

      setTimeout(() => {
        currentIndex++;
        if (currentIndex >= deck.length) { showDone(); return; }

        updateProgress();
        updateShadows();
        showBack();

        w.style.transition = 'none';
        w.style.transform = 'perspective(900px) rotateY(90deg)';
        w.style.opacity = '1';

        requestAnimationFrame(() => requestAnimationFrame(() => {
          w.style.transition = 'transform 0.24s ease-out';
          w.style.transform = 'perspective(900px) rotateY(0deg)';
          setTimeout(() => { isAnimating = false; }, 240);
        }));
      }, 200);
    }

    function showDone() {
      document.getElementById('main').style.display = 'none';
      document.getElementById('done-screen').style.display = 'flex';
      isAnimating = false;
    }

    function restartDeck() {
      deck = buildDeck();
      currentIndex = 0;
      isFlipped = false;
      isAnimating = false;

      document.getElementById('done-screen').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      document.getElementById('next-btn').classList.remove('visible');

      const w = document.getElementById('card-wrapper');
      w.style.transform = '';
      w.style.opacity = '1';

      updateProgress();
      updateShadows();
      showBack();
    }

    // Space/Enter flips; arrow right or Enter (post-flip) advances
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        if (!isFlipped && !isAnimating) flipCard();
        else if (isFlipped && !isAnimating) nextCard();
      } else if (e.code === 'ArrowRight' && isFlipped && !isAnimating) {
        nextCard();
      }
    });

    // Init
    deck = buildDeck();
    updateProgress();
    updateShadows();
    showBack();
  </script>
</body>
